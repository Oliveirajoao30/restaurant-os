<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RestaurantOS{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .status-badge-RECEBIDO    { background-color: #6c757d; }
    .status-badge-EM_PREPARO  { background-color: #fd7e14; }
    .status-badge-PRONTO      { background-color: #198754; }
    .status-badge-ENTREGUE    { background-color: #0d6efd; }
    .kanban-col { overflow-y: auto; max-height: 72vh; min-width: 180px; }
    .card-order { border-left: 4px solid #dee2e6; }
    .card-order.RECEBIDO   { border-left-color: #6c757d; }
    .card-order.EM_PREPARO { border-left-color: #fd7e14; }
    .card-order.PRONTO     { border-left-color: #198754; }
    .card-order.ENTREGUE   { border-left-color: #0d6efd; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'painel' %}">
        <i class="bi bi-shop"></i> RestaurantOS
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'painel' %}"><i class="bi bi-grid-3x3-gap"></i> Painel</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ CARDAPIO_SERVICE_URL }}" target="_blank"><i class="bi bi-menu-button-wide"></i> Cardápio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'pedido_novo' %}"><i class="bi bi-plus-circle"></i> Novo Pedido</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'notificacoes_list' %}"><i class="bi bi-bell"></i> Notificações</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    {% for message in messages %}
      <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'warning' %}warning{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
